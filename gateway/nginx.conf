worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  upstream users_upstream {
    server users:5001;
  }

  upstream products_upstream {
    server products:5002;
  }

  upstream orders_upstream {
    server orders:5003;
  }

  server {
    listen 8080;

    location = /health {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    location = /api/users {
      return 301 /api/users/;
    }

    location = /api/products {
      return 301 /api/products/;
    }

    location = /api/orders {
      return 301 /api/orders/;
    }

    location /api/users/ {
      proxy_pass http://users_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/products/ {
      proxy_pass http://products_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/orders/ {
      proxy_pass http://orders_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}